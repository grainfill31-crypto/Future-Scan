        en: [
            { title: '2028 Global Intelligence Crisis', desc: 'A report causes stock market drop 1.6%, credit card stocks fall 7%. Fears of AI失控蔓延。' },
            { title: 'Hyperinflation & Supply Chain Disruption', desc: 'Geopolitics drives resource prices soaring, corporate costs skyrocket.' },
            { title: 'Climate Tipping Point Triggered', desc: 'Permafrost melts releasing methane; global climate emergency declared.' }
        ],
        cn: [
            { title: '2028全球智能危机', desc: '一份报告导致股市下跌1.6%，信贷卡股票暴跌7%。AI失控担忧蔓延。' },
            { title: '超级通胀与供应链中断', desc: '地缘政治导致关键资源价格飙升，全球企业成本急剧上升。' },

            { title: '氣候臨界點觸發', desc: '北極永久凍土層大規模融化，釋放巨量甲烷，各國進入氣候緊急狀態。' }
        ]
    };

    // ========== 游戏状态 ==========
    let currentLang = null;
    let selectedLangForHome = 'cn';
    let currentStep = 1;
    let profession = '电影明星';
    let customProfInput = '';
    let selectedValues = ['赚钱', '出名', '从事创意工作'];
    let drawnCards = {
        'Economy': [], 'Technology': [], 'Socio-cultural': [], 'Governance': [], 'Environment & Sustainability': [], 'Well-being': []
    };
    let connections = [];
    let currentShock = null;
    let headline = '';
    let synergySelectedIds = [];

    // ========== 辅助函数 ==========
    function t(key) {
        if (!currentLang) return '';
        const langObj = LANG[currentLang];
        if (key === 'valuesList') return langObj.valuesList;
        if (key === 'professions') return langObj.professions;
        if (key === 'domains') return langObj.domains;
        return langObj[key] || key;
    }

    function genId() {
        return 'card_' + Date.now() + '_' + Math.random().toString(36).substr(2,8);
    }

    function getCardName(card) {
        return card.name[currentLang] || card.name['en'];
    }
    function getCardDesc(card) {
        return card.desc[currentLang] || card.desc['en'];
    }

    // ========== 真正的 DeepSeek AI 对话函数 ==========
   async function fetchAIResponse(profession, values, card, question) {
    const cardName = getCardName(card);
    const cardDesc = getCardDesc(card);
    try {
        const response = await fetch('https://future-scan-backend.onrender.com/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ profession, values, cardName, cardDesc, question })
        });
        const data = await response.json();
        return data.reply || 'AI暂时无法回答，请稍后重试。';
    } catch (error) {
        console.error(error);
        return '网络错误或API调用失败。请检查控制台。';
    }
}

    function resetGame() {
        profession = t('professions')[0];
        selectedValues = t('valuesList').slice(0,3);
        drawnCards = { 'Economy':[], 'Technology':[], 'Socio-cultural':[], 'Governance':[], 'Environment & Sustainability':[], 'Well-being':[] };
        connections = [];
        currentShock = null;
        synergySelectedIds = [];
        headline = '';
        currentStep = 1;
        render();
    }

    function goToLangHome() {
        currentLang = null;
        render();
    }

    function canDrawInDomain(domain) {
        const count = drawnCards[domain].length;
        if (domain === 'Technology') {
            return count < 2;
        } else {
            return count < 1;
        }
    }

    // ========== 渲染 ==========
    function render() {
        const app = document.getElementById('app');
        if (!currentLang) {
            app.innerHTML = `
                <div class="lang-home">
                    <h1>Future Scanning Game<br><span style="font-size:0.6em; color:#ffe68f;">未来扫描游戏</span></h1>
                    <div class="lang-buttons">
                        <div class="lang-btn ${selectedLangForHome==='en'?'selected':''}" data-lang="en">English</div>
                        <div class="lang-btn ${selectedLangForHome==='tw'?'selected':''}" data-lang="tw">繁體中文</div>
                        <div class="lang-btn ${selectedLangForHome==='cn'?'selected':''}" data-lang="cn">简体中文</div>
                    </div>
                    <button class="start-btn" id="startGameBtn">START</button>
                    <div class="footer-credit">CSTEM Lab, Faculty of Education, The University of Hong Kong</div>
                </div>
            `;
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.addEventListener('click', e => {
                    selectedLangForHome = e.target.dataset.lang;
                    render();
                });
            });
            document.getElementById('startGameBtn').addEventListener('click', ()=>{
                currentLang = selectedLangForHome;
                resetGame();
            });
            return;
        }

        if (currentStep === 4 && !currentShock) {
            const shocks = SHOCKS[currentLang] || SHOCKS['en'];
            currentShock = shocks[Math.floor(Math.random() * shocks.length)];
        }

        let html = `
            <div class="lang-return">
                <button class="return-lang-btn" id="returnLangBtn">${t('returnLang')}</button>
            </div>
            <div class="step-indicator">
                ${[1,2,3,4,5].map(s => `<div class="step-circle ${currentStep===s?'active':''}">${s}</div>`).join('')}
            </div>
            <div class="step-panel" id="stepPanel">
                ${renderStep()}
            </div>
            <div class="nav-buttons">
                <button class="nav-btn" id="prevBtn" ${currentStep===1?'disabled':''}>${t('prev')}</button>
                <button class="nav-btn primary" id="nextBtn">${currentStep===5 ? t('finish') : t('next')}</button>
            </div>
        `;
        app.innerHTML = html;

        document.getElementById('returnLangBtn').addEventListener('click', goToLangHome);
        document.getElementById('prevBtn').addEventListener('click', ()=>{
            if(currentStep>1) currentStep--;
            render();
        });
        document.getElementById('nextBtn').addEventListener('click', ()=>{
            if(currentStep===5) {
                resetGame();
                return;
            }
            if(currentStep===1) {
                if(selectedValues.length !==3) {
                    alert(t('values') + ' need 3');
                    return;
                }
            }
            currentStep++;
            render();
        });
        attachStepEvents();
    }

    function renderStep() {
        if(currentStep===1) return renderStep1();
        if(currentStep===2) return renderStep2();
        if(currentStep===3) return renderStep3();
        if(currentStep===4) return renderStep4();
        if(currentStep===5) return renderStep5();
    }

    function renderStep1() {
        let html = `<h2>${t('step1')}</h2>`;
        html += `<div style="margin-bottom:25px"><strong>${t('profession')}</strong>`;
        html += `<div class="profession-grid">`;
        t('professions').forEach(p => {
            html += `<div class="prof-option ${profession===p?'selected':''}" data-prof="${p}">${p}</div>`;
        });
        html += `</div>`;
        html += `<div class="custom-prof"><span>${t('customProf')}</span> <input type="text" id="customProfInput" placeholder="e.g., Astronaut" value="${customProfInput}"></div>`;
        html += `</div>`;
        html += `<div><strong>${t('values')} (${selectedValues.length}/3)</strong>`;
        html += `<div class="values-container">`;
        t('valuesList').forEach(v => {
            html += `<div class="value-chip ${selectedValues.includes(v)?'selected':''}" data-value="${v}">${v}</div>`;
        });
        html += `</div></div>`;
        return html;
    }

    function renderStep2() {
        let html = `<h2>${t('step2')}</h2>`;
        html += `<div class="step-guide">${t('step2Guide')}</div>`;
        html += `<div class="domain-board">`;
        const domains = ['Economy','Technology','Socio-cultural','Governance','Environment & Sustainability','Well-being'];
        domains.forEach(dom => {
            const canDraw = canDrawInDomain(dom);
            html += `<div class="domain-col">
                <div class="domain-title">${t('domains')[domains.indexOf(dom)]} 
                    <button class="draw-btn ${!canDraw ? 'disabled' : ''}" data-domain="${dom}" ${!canDraw ? 'disabled' : ''}>${t('draw')}</button>
                </div>`;
            drawnCards[dom].forEach(card => html += renderCard(card, true));
            html += `</div>`;
        });
        html += `</div>`;
        return html;
    }

    function renderStep3() {
        let html = `<h2>${t('step3')}</h2>`;
        html += `<div class="connection-zone">`;
        html += `<p><strong>${t('synergyHint')}</strong></p>`;
        html += `<div class="selected-cards">`;
        const allCards = [];
        for(let d in drawnCards) allCards.push(...drawnCards[d]);
        allCards.forEach(card => {
            const cardName = getCardName(card);
            html += `<div class="card-selector ${synergySelectedIds.includes(card.id)?'selected':''}" data-card-id="${card.id}">${cardName}</div>`;
        });
        html += `</div>`;
        html += `<button class="nav-btn" id="addSynergyBtn">${t('addSynergy')}</button>`;
        html += `<div class="synergy-list">`;
        connections.forEach((c,idx) => {
            html += `<div class="synergy-item">${t('synergy')} ${idx+1}: ${c.description}</div>`;
        });
        html += `</div>`;
        html += `</div>`;
        return html;
    }

    function renderStep4() {
        let html = `<h2>${t('step4')}</h2>`;
        if(currentShock) {
            html += `<div class="shock-area">`;
            html += `<div class="shock-title">⚠️ ${currentShock.title}</div>`;
            html += `<p style="font-size:1.2rem">${currentShock.desc}</p>`;
            html += `</div>`;
        }
        html += `<div class="flex-row">`;
        html += `<div class="left-column">`;
        html += `<p style="font-style:italic; margin-bottom:15px;">${t('shockPrompt')}</p>`;
        html += `<div class="extra-draw-section">`;
        const domains = ['Economy','Technology','Socio-cultural','Governance','Environment & Sustainability','Well-being'];
        domains.forEach(dom => {
            html += `<div style="margin:15px 0"><strong>${t('domains')[domains.indexOf(dom)]}</strong> <button class="draw-btn" data-domain="${dom}">${t('draw')}</button>`;
            drawnCards[dom].forEach(card => html += renderCard(card, true));
            html += `</div>`;
        });
        html += `</div>`;
        html += `</div>`;
        html += `<div class="right-column">`;
        html += `<h3 style="margin-bottom:15px;">📋 ${t('synergy')}</h3>`;
        if(connections.length === 0) {
            html += `<p>暂无协同</p>`;
        } else {
            connections.forEach((c,idx) => {
                html += `<div class="synergy-item" style="margin-bottom:10px;">${t('synergy')} ${idx+1}: ${c.description}</div>`;
            });
        }
        html += `</div>`;
        html += `</div>`;
        return html;
    }

    function renderStep5() {
        let html = `<h2>${t('step5')}</h2>`;
        html += `<div class="headline-area">`;
        html += `<p>${t('headlinePrompt')}</p>`;
        html += `<input class="chat-input" id="headlineInput" style="width:100%; margin:20px 0;" placeholder="e.g., Movie Star returns with AI virtual human" value="${headline}">`;
        html += `<div style="display:flex; gap:15px;">`;
        html += `<button class="nav-btn" id="aiSuggBtn">${t('aiSuggestion')}</button>`;
        html += `<button class="nav-btn primary" id="genCoverBtn">${t('generateCover')}</button>`;
        html += `</div>`;
        html += `<div class="cover-preview" id="coverPreview">${headline || '2036 HEADLINE'}</div>`;
        html += `</div>`;
        return html;
    }

    function renderCard(card, allowDelete) {
        let stageColor = '#88c9f2';
        if(card.stage === 'Brewing') stageColor = '#b39fe0';
        else if(card.stage === 'Signaling') stageColor = '#f4b860';
        else if(card.stage === 'Trending') stageColor = '#6cc4a1';
        else if(card.stage === 'Driving') stageColor = '#e68c7c';
        else if(card.stage === 'Emerging') stageColor = '#f2b88c';
        const cardName = getCardName(card);
        const cardDesc = getCardDesc(card);
        return `
            <div class="card-item" data-card-id="${card.id}" style="border-left-color: ${stageColor};">
                <div class="card-header">
                    <span class="card-name">${cardName}</span>
                    <span class="card-stage">${card.stage}</span>
                </div>
                <div class="card-desc">${cardDesc}</div>
                <div class="card-actions">
                    <button class="ai-chat-btn" data-card-id="${card.id}">${t('aiChat')}</button>
                    ${allowDelete ? `<button class="delete-card-btn" data-card-id="${card.id}">${t('delete')}</button>` : ''}
                </div>
                <textarea class="thought-textarea" placeholder="写下你的想法..." data-card-id="${card.id}">${card.thought || ''}</textarea>
                <div class="chat-modal" id="chat-${card.id}">
                    <div class="chat-messages" id="msg-${card.id}">${t('chatIntro')}</div>
                    <div class="chat-input-area">
                        <input class="chat-input" id="inp-${card.id}" placeholder="Ask...">
                        <button class="send-chat" data-card-id="${card.id}">${t('send')}</button>
                    </div>
                </div>
            </div>
        `;
    }

    function attachStepEvents() {
        if(currentStep===1) {
            document.querySelectorAll('.prof-option').forEach(el => {
                el.addEventListener('click', e => {
                    profession = e.target.dataset.prof;
                    customProfInput = '';
                    document.getElementById('customProfInput').value = '';
                    render();
                });
            });
            document.getElementById('customProfInput')?.addEventListener('input', e => {
                customProfInput = e.target.value;
                if(customProfInput.trim()) profession = customProfInput.trim();
                document.querySelectorAll('.prof-option').forEach(p => p.classList.remove('selected'));
            });
            document.querySelectorAll('.value-chip').forEach(el => {
                el.addEventListener('click', e => {
                    const val = e.target.dataset.value;
                    if(selectedValues.includes(val)) {
                        selectedValues = selectedValues.filter(v => v!==val);
                    } else if(selectedValues.length < 3) {
                        selectedValues.push(val);
                    } else {
                        alert(t('values') + '最多选择3个');
                    }
                    render();
                });
            });
        }

        if(currentStep===2) {
            document.querySelectorAll('.draw-btn:not(.disabled)').forEach(btn => {
                btn.addEventListener('click', e => {
                    const domain = e.target.dataset.domain;
                    if (!canDrawInDomain(domain)) {
                        alert(`已达上限，请先删除一张${domain==='Technology'?'技术领域最多2张':'该领域最多1张'}`);
                        return;
                    }
                    const domainCards = CARDS_DB[domain] || [];
                    if(domainCards.length===0) return;
                    const rand = domainCards[Math.floor(Math.random()*domainCards.length)];
                    const newCard = {
                        name: { ...rand.name },
                        desc: { ...rand.desc },
                        stage: rand.stage,
                        id: genId(),
                        thought: ''
                    };
                    drawnCards[domain].push(newCard);
                    render();
                });
            });
            attachCardEvents(true);
        }

        if(currentStep===3) {
            document.querySelectorAll('.card-selector').forEach(el => {
                el.addEventListener('click', e => {
                    const id = e.target.dataset.cardId;
                    if(synergySelectedIds.includes(id)) {
                        synergySelectedIds = synergySelectedIds.filter(i => i!==id);
                    } else {
                        if(synergySelectedIds.length < 2) synergySelectedIds.push(id);
                        else alert('最多选择两张卡片');
                    }
                    render();
                });
            });
            document.getElementById('addSynergyBtn')?.addEventListener('click', ()=>{
                if(synergySelectedIds.length !==2) { alert('请选择两张卡片'); return; }
                const promptMsg = t('addSynergyPrompt');
                const desc = prompt(promptMsg);
                if(desc && desc.trim()) {
                    connections.push({ cardId1: synergySelectedIds[0], cardId2: synergySelectedIds[1], description: desc.trim() });
                    synergySelectedIds = [];
                    render();
                }
            });
        }

        if(currentStep===4) {
            document.querySelectorAll('.draw-btn').forEach(btn => {
                btn.addEventListener('click', e => {
                    const domain = e.target.dataset.domain;
                    const domainCards = CARDS_DB[domain] || [];
                    if(domainCards.length===0) return;
                    const rand = domainCards[Math.floor(Math.random()*domainCards.length)];
                    const newCard = {
                        name: { ...rand.name },
                        desc: { ...rand.desc },
                        stage: rand.stage,
                        id: genId(),
                        thought: ''
                    };
                    drawnCards[domain].push(newCard);
                    render();
                });
            });
            attachCardEvents(true);
        }

        if(currentStep===5) {
            document.getElementById('aiSuggBtn')?.addEventListener('click', ()=>{
                const vals = selectedValues.join('、');
                const sugg = `基于你的职业「${profession}」和价值观「${vals}」，2036年头条可能是：${profession}利用AI与跨领域合作，成为全球文化新象征。`;
                alert(sugg);
            });
            document.getElementById('genCoverBtn')?.addEventListener('click', ()=>{
                headline = document.getElementById('headlineInput')?.value || '2036 Future';
                document.getElementById('coverPreview').innerText = headline;
            });
        }
    }

    function attachCardEvents(allowDelete) {
        document.querySelectorAll('.ai-chat-btn').forEach(btn => {
            btn.addEventListener('click', e => {
                const cardId = e.target.dataset.cardId;
                const chatDiv = document.getElementById('chat-'+cardId);
                if(chatDiv) chatDiv.classList.toggle('show');
            });
        });

        document.querySelectorAll('.send-chat').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                const cardId = e.target.dataset.cardId;
                const inp = document.getElementById('inp-'+cardId);
                const question = inp.value.trim();
                if(!question) return;

                let card = null;
                for(let d in drawnCards) {
                    const found = drawnCards[d].find(c => c.id === cardId);
                    if(found) { card = found; break; }
                }
                if(!card) return;

                const msgDiv = document.getElementById('msg-'+cardId);
                msgDiv.innerHTML += `<div><b>你:</b> ${question}</div><div><i>AI思考中...</i></div>`;
                inp.value = '';

                const answer = await fetchAIResponse(profession, selectedValues, card, question);
                // 移除最后一个“思考中”
                const children = msgDiv.children;
                if(children.length > 0) {
                    msgDiv.removeChild(children[children.length-1]);
                }
                msgDiv.innerHTML += `<div><b>AI:</b> ${answer}</div><hr>`;
            });
        });

        document.querySelectorAll('.thought-textarea').forEach(ta => {
            ta.removeEventListener('blur', saveThought);
            ta.addEventListener('blur', saveThought);
        });

        if(allowDelete) {
            document.querySelectorAll('.delete-card-btn').forEach(btn => {
                btn.addEventListener('click', e => {
                    const cardId = e.target.dataset.cardId;
                    for(let d in drawnCards) {
                        drawnCards[d] = drawnCards[d].filter(c => c.id !== cardId);
                    }
                    render();
                });
            });
        }
    }

    function saveThought(e) {
        const ta = e.target;
        const cardId = ta.dataset.cardId;
        const thought = ta.value;
        for(let d in drawnCards) {
            const card = drawnCards[d].find(c => c.id === cardId);
            if(card) {
                card.thought = thought;
                break;
            }
        }
    }

    render();
})();
</script>
</body>
</html>
